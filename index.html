<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Musik verstehen – Kapitel-Navigation</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css?family=Lato:400,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sidebar-width: 80px;
      --sidebar-panel-width: 260px;
      /* Farbschema angelehnt an Abletons "Learning Synths" */
      --sidebar-bg: #f1eef9;
      --sidebar-border: #dacafd;
      --active: #7e33ff;
      --inactive: #a7a0c2;
      --text: #f4f4f4;
      --card: #1a1a1a;
      --shadow: 0 2px 12px #0001;
      --panel-overlay: rgba(0,0,0,0.10);
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Lato', Arial, sans-serif;
      background: #000;
      color: var(--text);
      min-height: 100vh;
      box-sizing: border-box;
    }
    /* Sidebar (schmal, immer sichtbar) */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      z-index: 301;
      cursor: pointer;
      transition: background 0.13s;
    }
    .sidebar:active,
    .sidebar:focus-within {
      background: #dacafd33;
    }
    .sidebar-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
      height: 100vh;
      width: 100%;
      cursor: pointer;
    }
    .menu-icon-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      user-select: none;
      margin-bottom: 8px;
      transition: background 0.14s;
      height: 56px;
      cursor: pointer;
    }
    .menu-icon-wrapper:hover {
      background: #dacafd55;
    }
    .menu-icon {
      width: 38px;
      height: 38px;
      display: block;
      margin: 0 auto;
      fill: var(--active);
    }
    .sidebar-vertical {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 1.09rem;
      font-weight: 700;
      color: var(--active);
      letter-spacing: 0.22em;
      user-select: none;
      text-align: center;
      margin: 0;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.16s;
      height: calc(100vh - 56px);
      cursor: pointer;
    }

    /* Das Panel: Overlay rechts neben der Sidebar */
    .sidebar-panel-overlay {
      display: none;
      position: fixed;
      top: 0; left: var(--sidebar-width); height: 100vh; 
      width: 100vw;
      background: var(--panel-overlay);
      z-index: 400;
    }
    .sidebar.open + .sidebar-panel-overlay {
      display: block;
    }
    .sidebar-panel {
      position: fixed;
      left: var(--sidebar-width);
      top: 0;
      height: 100vh;
      width: var(--sidebar-panel-width);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      box-shadow: 4px 0 24px #7e33ff0d;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-32px);
      transition: 
        opacity 0.22s cubic-bezier(.5,1.65,.4,1),
        transform 0.25s cubic-bezier(.5,1.65,.4,1);
      padding: 0 0 0 20px;
      margin: 0;
      overflow-y: auto;
      max-height: 100vh;
      z-index: 401;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .sidebar.open ~ .sidebar-panel {
      opacity: 1;
      pointer-events: all;
      transform: translateX(0);
    }
    .sidebar-panel-title {
      font-size: 1.12rem;
      font-weight: 700;
      color: var(--active);
      margin: 38px 0 16px 0;
      letter-spacing: 0.04em;
    }
    .sidebar-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .sidebar-list li {
      font-size: 1.09rem;
      color: var(--text);
      padding: 12px 0 12px 14px;
      border-radius: 8px 0 0 8px;
      cursor: pointer;
      transition: background 0.13s, color 0.13s;
      margin-bottom: 7px;
      white-space: nowrap;
    }
    .sidebar-list li.active,
    .sidebar-list li:hover {
      background: #dacafd;
      color: var(--active);
    }
    /* Main */
    .main-content {
      margin-left: var(--sidebar-width);
      transition: margin-left 0.22s cubic-bezier(.5,1.65,.4,1);
      padding: 42px 4vw 32px 4vw;
      min-height: 100vh;
    }
    .content-card {
      max-width: 660px;
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 38px 40px 38px 40px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-height: 340px;
    }
    .lesson-title {
      font-size: 2.1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: var(--active);
      letter-spacing: 0.01em;
      text-align: left;
      width: 100%;
    }
    .lesson-intro {
      font-size: 1.12rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 2.2rem;
      max-width: 520px;
      text-align: left;
      font-weight: 400;
    }
    .puls-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 2.3rem;
      user-select: none;
      width: 100%;
    }
    .puls-dot {
      width: 40px;
      height: 40px;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: #dacafd;
      border: none;
      transition: background 0.19s, transform 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .puls-dot.active {
      background: #7e33ff;
      transform: scale(1.18);
    }
    /* Lautsprecher */
    .speaker {
      position: absolute;
      right: 40px; top: 34px;
      width: 34px; height: 34px;
      cursor: pointer;
      fill: #7e33ff;
      transition: fill 0.2s;
      z-index: 100;
      background: #fff9;
      border-radius: 50%;
      padding: 6px;
      box-shadow: none;
      border: none;
      outline: none;
    }
    .speaker.on {
      fill: var(--text);
    }
    .speaker:active {
      scale: 0.96;
    }
    @media (max-width: 900px) {
      .content-card {
        padding: 18px 2vw 18px 2vw;
        min-height: 220px;
      }
      .lesson-title { font-size: 1.3rem; }
      .main-content {
        padding: 18px 2vw 18px 2vw;
      }
      .sidebar-panel {
        width: 94vw;
        min-width: 180px;
        left: var(--sidebar-width);
      }
    }
  </style>
</head>
<body>
  <!-- Die schmale Sidebar bleibt IMMER sichtbar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-main" id="sidebarMain">
      <div class="menu-icon-wrapper" aria-label="Menü öffnen">
        <svg class="menu-icon" viewBox="0 0 44 44">
          <rect x="10" y="13" width="24" height="3.6" rx="1.7"/>
          <rect x="10" y="20" width="24" height="3.6" rx="1.7"/>
          <rect x="10" y="27" width="24" height="3.6" rx="1.7"/>
        </svg>
      </div>
      <div class="sidebar-vertical">Kapitel</div>
    </div>
  </nav>
  <!-- Overlay hinter Panel, aber über Body, zum schließen -->
  <div class="sidebar-panel-overlay" id="sidebarPanelOverlay"></div>
  <!-- Das Panel legt sich als Overlay daneben -->
  <aside class="sidebar-panel" id="sidebarPanel" aria-label="Kapitelübersicht">
    <div class="sidebar-panel-title">Kapitel</div>
    <ul class="sidebar-list" id="kapitelList">
      <li class="active">Puls</li>
      <li>Metrum</li>
      <li>Rhythmus</li>
      <li>Melodie</li>
    </ul>
  </aside>
  <main class="main-content" id="mainContent">
    <section class="content-card" id="contentCard">
      <svg class="speaker" id="speaker" viewBox="0 0 36 36" tabindex="0" aria-label="Sound an/aus">
        <g id="icon-on">
          <path d="M7,14v8h6l8,8V6l-8,8H7z"/>
          <path d="M24 12.5a4.5 4.5 0 010 11"/>
        </g>
        <g id="icon-off" style="display:none;">
          <path d="M7,14v8h6l8,8V6l-8,8H7z"/>
          <line x1="28" y1="8" x2="8" y2="28" stroke="#c00" stroke-width="2"/>
        </g>
      </svg>
      <div class="lesson-title">Der Puls der Musik</div>
      <div class="lesson-intro">
        Jedes Musikstück besitzt einen inneren Puls – einen gleichmäßigen, strukturierenden Grundschlag.<br>
        Dieser Puls gibt uns Musikern Stabilität und Orientierung.
      </div>
      <div class="puls-row" id="pulsRow"></div>
    </section>
  </main>
  <script>
    // Sidebar-Panel: Öffnen durch Klick auf Sidebar (egal wo)
    const sidebar = document.getElementById('sidebar');
    const sidebarMain = document.getElementById('sidebarMain');
    const sidebarPanel = document.getElementById('sidebarPanel');
    const sidebarPanelOverlay = document.getElementById('sidebarPanelOverlay');

    sidebarMain.addEventListener('click', e => {
      sidebar.classList.add('open');
      e.stopPropagation();
    });
    // Panel schließt durch Klick auf Overlay oder auf die Sidebar wenn bereits offen
    sidebarPanelOverlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
    });
    // Panel schließt auch bei Klick auf Sidebar, wenn schon offen
    sidebar.addEventListener('click', e => {
      if (sidebar.classList.contains('open')) {
        sidebar.classList.remove('open');
        e.stopPropagation();
      }
    });
    // Kapitel-Navigation (Dummy: nur Optik, noch keine Wechsel-Logik)
    const kapitelList = document.getElementById('kapitelList').children;
    for (let i = 0; i < kapitelList.length; i++) {
      kapitelList[i].addEventListener('click', function() {
        for (let j = 0; j < kapitelList.length; j++) kapitelList[j].classList.remove('active');
        this.classList.add('active');
        // Optional: hier später die Anzeige des passenden Kapitels triggern!
      });
    }
    // Puls-Animation
    const NUM_PULS = 16; // Zahl der Kreise
    const TEMPO = 85; // BPM
    let pulseStep = 0;
    let playSound = false;
    let audioCtx = null;
    const pulsRow = document.getElementById('pulsRow');
    for(let i=0;i<NUM_PULS;i++){
      let dot = document.createElement('div');
      dot.className = 'puls-dot';
      pulsRow.appendChild(dot);
    }
    const dots = document.querySelectorAll('.puls-dot');
    // Lautsprecher-Button
    const speaker = document.getElementById('speaker');
    const iconOn = speaker.querySelector('#icon-on');
    const iconOff = speaker.querySelector('#icon-off');
    function updateSpeakerIcon(){
      speaker.classList.toggle('on', playSound);
      iconOn.style.display = playSound ? 'inline' : 'none';
      iconOff.style.display = playSound ? 'none' : 'inline';
    }
    updateSpeakerIcon();
    function toggleSound(){
      playSound = !playSound;
      updateSpeakerIcon();
    }
    speaker.addEventListener('click', toggleSound);
    speaker.addEventListener('keydown', (e)=>{
      if(e.key===" "||e.key==="Enter"){ e.preventDefault(); toggleSound(); }
    });
    function playClick(){
      if(!playSound) return;
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.frequency.value = 930;
      gain.gain.value = 0.09;
      osc.type = 'sine';
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime+0.07);
    }
    function stepPulse(){
      dots.forEach(dot=>dot.classList.remove('active'));
      dots[pulseStep].classList.add('active');
      playClick();
      pulseStep = (pulseStep+1)%NUM_PULS;
    }
    setInterval(stepPulse, 60000/TEMPO);
  </script>
</body>
</html>
